<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportCal Rugby 🏉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-clubs { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; }
        /* Animation quand on coche */
        input:checked + div { border-color: #f97316; background-color: rgba(249, 115, 22, 0.15); border-width: 3px; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center p-6 uppercase">
    
    <div class="max-w-4xl w-full text-center">
        <h1 class="text-5xl font-black mb-2 italic tracking-tighter">SportCal Rugby</h1>
        <p class="text-slate-500 mb-10 text-sm font-bold tracking-[0.5em]">TOP 14 • EDITION 2026</p>

        <div class="bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-700">
            <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                <h2 class="text-lg font-bold text-slate-400 italic">Sélection :</h2>
                <button onclick="toggleAll()" class="text-[10px] font-black bg-slate-700 px-4 py-2 rounded-full hover:bg-slate-600 transition">Tout cocher</button>
            </div>
            
            <div id="clubs-list" class="grid-clubs mb-10">
                </div>

            <button onclick="generate()" class="w-full bg-orange-600 hover:bg-orange-500 py-5 rounded-2xl font-black text-xl transition-all shadow-xl shadow-orange-900/40 active:scale-95">
                GÉNÉRER MON CALENDRIER
            </button>
        </div>

        <div id="result" class="hidden mt-8 p-6 bg-slate-950 rounded-[2rem] border border-orange-500/30">
            <p class="text-[10px] text-orange-400 mb-3 font-black tracking-widest">LIEN DE SYNCHRO PRÊT :</p>
            <code id="url" class="text-blue-300 break-all text-xs block p-4 bg-slate-900 rounded-xl border border-slate-800 mb-2 lowercase font-mono"></code>
        </div>
    </div>

    <script>
        // Utilisation du proxy Google pour les images
        const getLogo = (url) => `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent(url)}`;

        const clubs = [
            { id: "stade-toulousain", name: "Toulouse", logo: "https://www.lnr.fr/sites/default/files/stade_toulousain.png" },
            { id: "stade-rochelais", name: "La Rochelle", logo: "https://www.lnr.fr/sites/default/files/stade_rochelais_0.png" },
            { id: "ubb-bordeaux", name: "Bordeaux", logo: "https://www.lnr.fr/sites/default/files/ubb_0.png" },
            { id: "rct-toulon", name: "Toulon", logo: "https://www.lnr.fr/sites/default/files/toulon.png" },
            { id: "racing-92", name: "Racing 92", logo: "https://www.lnr.fr/sites/default/files/racing92.png" },
            { id: "stade-francais", name: "Stade Français", logo: "https://www.lnr.fr/sites/default/files/stade_francais.png" },
            { id: "asm-clermont", name: "Clermont", logo: "https://www.lnr.fr/sites/default/files/asm.png" },
            { id: "lyon-lou", name: "Lyon LOU", logo: "https://www.lnr.fr/sites/default/files/lou_rugby.png" },
            { id: "castres-olympique", name: "Castres", logo: "https://www.lnr.fr/sites/default/files/castres_olympique.png" },
            { id: "pau-section", name: "Pau", logo: "https://www.lnr.fr/sites/default/files/section_paloise.png" },
            { id: "bayonne", name: "Bayonne", logo: "https://www.lnr.fr/sites/default/files/bayonne.png" },
            { id: "perpignan", name: "Perpignan", logo: "https://www.lnr.fr/sites/default/files/usap.png" },
            { id: "montpellier", name: "Montpellier", logo: "https://www.lnr.fr/sites/default/files/mhr.png" },
            { id: "montauban", name: "Montauban", logo: "https://www.lnr.fr/sites/default/files/montauban.png" }
        ];

        const list = document.getElementById('clubs-list');
        clubs.forEach(c => {
            const l = document.createElement('label');
            l.className = "cursor-pointer group";
            l.innerHTML = `
                <input type="checkbox" value="${c.id}" class="hidden">
                <div class="flex flex-col items-center p-4 bg-slate-700/20 rounded-2xl border-2 border-transparent transition-all">
                    <img src="${getLogo(c.logo)}" alt="${c.name}" class="w-14 h-14 object-contain mb-3 pointer-events-none">
                    <span class="text-[9px] font-black text-slate-400 group-hover:text-white">${c.name}</span>
                </div>
            `;
            list.appendChild(l);
        });

        function toggleAll() {
            const checks = document.querySelectorAll('input[type="checkbox"]');
            const allChecked = Array.from(checks).every(c => c.checked);
            checks.forEach(c => c.checked = !allChecked);
        }

        function generate() {
            const ids = Array.from(document.querySelectorAll('input:checked')).map(c => c.value).join(',');
            if(!ids) return alert("Choisis un club !");
            document.getElementById('url').innerText = window.location.origin + '/api/cal?teams=' + btoa(ids);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
