<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportCal Rugby 🏉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-clubs { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1rem; }
        input:checked + div { border-color: #f97316; background-color: rgba(249, 115, 22, 0.1); transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center p-6">
    
    <div class="max-w-4xl w-full text-center">
        <h1 class="text-6xl font-black mb-2 bg-gradient-to-r from-red-600 to-orange-500 bg-clip-text text-transparent italic tracking-tighter">SportCal Rugby</h1>
        <p class="text-slate-400 mb-10 text-xl font-medium uppercase tracking-[0.3em]">Top 14 • Calendrier Complet</p>

        <div class="bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-700">
            <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                <h2 class="text-xl font-bold text-slate-300 italic">Sélectionnez vos clubs :</h2>
                <button onclick="toggleAll()" class="text-[10px] font-black bg-slate-700 px-4 py-2 rounded-full hover:bg-slate-600 transition uppercase">Tout cocher</button>
            </div>
            
            <div id="clubs-list" class="grid-clubs mb-10 text-white">
                </div>

            <button onclick="generate()" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-5 rounded-2xl font-black text-xl transition-all shadow-xl shadow-orange-900/40 active:scale-95">
                CRÉER MON CALENDRIER LIVE
            </button>
        </div>

        <div id="result" class="hidden mt-8 p-6 bg-slate-950 rounded-[2rem] border border-orange-500/30">
            <p class="text-xs text-orange-400 mb-3 uppercase tracking-widest font-black">Lien de synchronisation prêt :</p>
            <code id="url" class="text-blue-300 break-all text-sm block p-4 bg-slate-900 rounded-xl border border-slate-800 mb-4 font-mono"></code>
            <p class="text-xs text-slate-500 italic font-medium">Copiez ce lien et collez-le dans "Ajouter par URL" sur Google ou Apple Cal.</p>
        </div>
    </div>

    <script>
        const clubs = [
            { id: "stade-toulousain", name: "Toulouse", logo: "https://www.lnr.fr/sites/default/files/stade_toulousain.png" },
            { id: "stade-rochelais", name: "La Rochelle", logo: "https://www.lnr.fr/sites/default/files/stade_rochelais_0.png" },
            { id: "ubb-bordeaux", name: "Bordeaux-B.", logo: "https://www.lnr.fr/sites/default/files/ubb_0.png" },
            { id: "rct-toulon", name: "Toulon", logo: "https://www.lnr.fr/sites/default/files/toulon.png" },
            { id: "racing-92", name: "Racing 92", logo: "https://www.lnr.fr/sites/default/files/racing92.png" },
            { id: "stade-francais", name: "Stade Français", logo: "https://www.lnr.fr/sites/default/files/stade_francais.png" },
            { id: "asm-clermont", name: "Clermont", logo: "https://www.lnr.fr/sites/default/files/asm.png" },
            { id: "lyon-lou", name: "Lyon LOU", logo: "https://www.lnr.fr/sites/default/files/lou_rugby.png" },
            { id: "castres-olympique", name: "Castres", logo: "https://www.lnr.fr/sites/default/files/castres_olympique.png" },
            { id: "pau-section", name: "Pau Section", logo: "https://www.lnr.fr/sites/default/files/section_paloise.png" },
            { id: "bayonne", name: "Bayonne", logo: "https://www.lnr.fr/sites/default/files/bayonne.png" },
            { id: "perpignan", name: "Perpignan", logo: "https://www.lnr.fr/sites/default/files/usap.png" },
            { id: "montpellier", name: "Montpellier", logo: "https://www.lnr.fr/sites/default/files/mhr.png" },
            { id: "montauban", name: "Montauban", logo: "https://www.lnr.fr/sites/default/files/montauban.png" }
        ];

        const list = document.getElementById('clubs-list');
        clubs.forEach(c => {
            const l = document.createElement('label');
            l.className = "relative cursor-pointer group";
            l.innerHTML = `
                <input type="checkbox" value="${c.id}" class="hidden">
                <div class="flex flex-col items-center p-4 bg-slate-700/20 rounded-2xl border-2 border-transparent transition-all group-hover:bg-slate-700/50">
                    <img src="${c.logo}" alt="${c.name}" class="w-16 h-16 object-contain mb-3 filter drop-shadow-lg">
                    <span class="text-[10px] font-black uppercase text-slate-300 text-center">${c.name}</span>
                </div>
            `;
            list.appendChild(l);
        });

        function toggleAll() {
            const checks = document.querySelectorAll('input[type="checkbox"]');
            const allChecked = Array.from(checks).every(c => c.checked);
            checks.forEach(c => c.checked = !allChecked);
        }

        function generate() {
            const ids = Array.from(document.querySelectorAll('input:checked')).map(c => c.value).join(',');
            if(!ids) return alert("Sélectionne au moins un club !");
            document.getElementById('url').innerText = window.location.origin + '/api/cal?teams=' + btoa(ids);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
