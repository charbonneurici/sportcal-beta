<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportCal Rugby 🏉</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center p-6 uppercase">
    
    <div class="max-w-4xl w-full text-center">
        <h1 class="text-5xl font-black mb-2 italic tracking-tighter">SportCal Rugby</h1>
        <p class="text-slate-500 mb-10 text-sm font-bold tracking-[0.5em]">TEST LOGOS INTERNES</p>

        <div class="bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-700">
            <div id="clubs-list" class="grid grid-cols-2 gap-4 mb-10">
                <label class="cursor-pointer group">
                    <input type="checkbox" value="stade-toulousain" class="hidden">
                    <div class="flex flex-col items-center p-4 bg-slate-700/20 rounded-2xl border-2 border-transparent transition-all hover:bg-slate-700/50">
                        <img src="https://api.dicebear.com/7.x/identicon/svg?seed=toulouse" class="w-16 h-16 mb-2">
                        <span class="text-xs font-black">TOULOUSE</span>
                    </div>
                </label>

                <label class="cursor-pointer group">
                    <input type="checkbox" value="stade-rochelais" class="hidden">
                    <div class="flex flex-col items-center p-4 bg-slate-700/20 rounded-2xl border-2 border-transparent transition-all hover:bg-slate-700/50">
                        <img src="https://api.dicebear.com/7.x/identicon/svg?seed=larochelle" class="w-16 h-16 mb-2">
                        <span class="text-xs font-black">LA ROCHELLE</span>
                    </div>
                </label>
            </div>

            <button onclick="generate()" class="w-full bg-orange-600 py-5 rounded-2xl font-black">GÉNÉRER</button>
        </div>
        
        <div id="result" class="hidden mt-8 p-6 bg-slate-950 rounded-2xl border border-orange-500/30">
            <code id="url" class="text-blue-300 break-all text-xs block p-4 bg-slate-900 rounded-xl lowercase"></code>
        </div>
    </div>

    <script>
        function generate() {
            const ids = Array.from(document.querySelectorAll('input:checked')).map(c => c.value).join(',');
            document.getElementById('url').innerText = window.location.origin + '/api/cal?teams=' + btoa(ids);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
