<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SportCal Beta 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6 text-center font-sans">
    
    <h1 class="text-5xl font-black mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">SportCal</h1>
    <p class="text-slate-400 mb-10">Zéro serveur, zéro bug. Juste tes matchs.</p>

    <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 w-full max-w-md shadow-2xl">
        <h2 class="text-xl font-bold mb-6 text-left">Choisis tes équipes :</h2>
        
        <div class="space-y-4 mb-8 text-left">
            <label class="flex items-center p-4 bg-slate-700/50 rounded-2xl cursor-pointer hover:bg-slate-600 transition">
                <input type="checkbox" id="psg" class="w-6 h-6 mr-4 accent-emerald-400">
                <div><p class="font-bold">PSG</p><p class="text-xs text-slate-400">Football</p></div>
            </label>
            
            <label class="flex items-center p-4 bg-slate-700/50 rounded-2xl cursor-pointer hover:bg-slate-600 transition">
                <input type="checkbox" id="xv" class="w-6 h-6 mr-4 accent-blue-400">
                <div><p class="font-bold">XV de France</p><p class="text-xs text-slate-400">Rugby</p></div>
            </label>
        </div>

        <button onclick="genererCalendrier()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 py-4 rounded-2xl font-black text-lg transition shadow-lg">
            Générer mon fichier .ics
        </button>
    </div>

    <div id="info" class="mt-8 text-slate-500 text-sm max-w-sm">
        Une fois le fichier téléchargé, ouvre-le simplement pour l'ajouter à ton calendrier habituel.
    </div>

    <script>
        function genererCalendrier() {
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//SportCal//FR\n";
            
            if(document.getElementById('psg').checked) {
                icsContent += "BEGIN:VEVENT\nSUMMARY:⚽️ PSG vs Monaco\nDTSTART:20260328T210000Z\nDTEND:20260328T224500Z\nEND:VEVENT\n";
            }
            if(document.getElementById('xv').checked) {
                icsContent += "BEGIN:VEVENT\nSUMMARY:🏉 France vs Pays de Galles\nDTSTART:20260321T154500Z\nDTEND:20260321T173000Z\nEND:VEVENT\n";
            }
            
            icsContent += "END:VCALENDAR";

            // Création d'un lien invisible pour télécharger le fichier direct
            const blob = new Blob([icsContent], { type: 'text/calendar' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mon_calendrier_sport.ics';
            a.click();
        }
    </script>
</body>
</html>
