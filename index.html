<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportCal Rugby 🏉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-clubs { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1rem; }
        input:checked + div { border-color: #f97316; background-color: rgba(249, 115, 22, 0.1); border-width: 3px; }
        svg { width: 60px; height: 60px; margin-bottom: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center p-6 uppercase">
    
    <div class="max-w-4xl w-full text-center">
        <h1 class="text-5xl font-black mb-2 italic tracking-tighter">SportCal Rugby</h1>
        <p class="text-slate-500 mb-10 text-sm font-bold tracking-[0.5em]">MODE LOGOS INTÉGRÉS (SANS LIENS)</p>

        <div class="bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-700">
            <div id="clubs-list" class="grid-clubs mb-10">
                
                <label class="cursor-pointer group">
                    <input type="checkbox" value="stade-toulousain" class="hidden">
                    <div class="flex flex-col items-center p-4 bg-slate-700/20 rounded-2xl border-2 border-transparent transition-all">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="48" fill="black" stroke="#ff0000" stroke-width="2"/>
                            <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="25" font-weight="bold" font-family="Arial">ST</text>
                            <path d="M20 50 Q 50 10 80 50" stroke="#ff0000" fill="none" stroke-width="3"/>
                        </svg>
                        <span class="text-[10px] font-black text-slate-300">TOULOUSE</span>
                    </div>
                </label>

                <label class="cursor-pointer group">
                    <input type="checkbox" value="stade-rochelais" class="hidden">
                    <div class="flex flex-col items-center p-4 bg-slate-700/20 rounded-2xl border-2 border-transparent transition-all">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="48" fill="#facc15" stroke="black" stroke-width="2"/>
                            <text x="50%" y="55%" text-anchor="middle" fill="black" font-size="25" font-weight="bold" font-family="Arial">SR</text>
                            <path d="M30 70 L 50 30 L 70 70" stroke="black" fill="none" stroke-width="5"/>
                        </svg>
                        <span class="text-[10px] font-black text-slate-300">LA ROCHELLE</span>
                    </div>
                </label>

            </div>

            <button onclick="generate()" class="w-full bg-orange-600 py-5 rounded-2xl font-black text-xl shadow-xl active:scale-95">
                GÉNÉRER MON CALENDRIER
            </button>
        </div>

        <div id="result" class="hidden mt-8 p-6 bg-slate-950 rounded-[2rem] border border-orange-500/30">
            <code id="url" class="text-blue-300 break-all text-xs block p-4 bg-slate-900 rounded-xl border border-slate-800 lowercase font-mono"></code>
        </div>
    </div>

    <script>
        function generate() {
            const ids = Array.from(document.querySelectorAll('input:checked')).map(c => c.value).join(',');
            if(!ids) return alert("Choisis un club !");
            document.getElementById('url').innerText = window.location.origin + '/api/cal?teams=' + btoa(ids);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
