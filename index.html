<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportCal Rugby 🏉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .grid-clubs { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 1rem; }
        
        /* Animation de la carte */
        .club-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .club-card:hover { transform: translateY(-5px); }
        
        /* État coché */
        input:checked + .card-content {
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.1);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.2);
        }
        input:checked + .card-content .placeholder-icon {
            color: #f97316;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center p-4 md:p-10">
    
    <div class="max-w-4xl w-full">
        <header class="text-center mb-12">
            <h1 class="text-6-xl md:text-7xl font-black italic tracking-tighter text-white mb-2">
                SPORT<span class="text-orange-500">CAL</span>
            </h1>
            <div class="inline-block px-4 py-1 bg-orange-500/10 border border-orange-500/20 rounded-full">
                <p class="text-orange-500 text-xs font-bold uppercase tracking-widest">Calendrier Dynamique Top 14</p>
            </div>
        </header>

        <main class="bg-slate-800/40 backdrop-blur-xl border border-white/10 p-6 md:p-10 rounded-[2.5rem] shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                <div>
                    <h2 class="text-2xl font-black text-white uppercase italic">Sélection des clubs</h2>
                    <p class="text-slate-400 text-sm font-medium">Cochez les équipes à synchroniser</p>
                </div>
                <button onclick="toggleAll()" id="btnToggle" class="text-[10px] font-black tracking-widest bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-xl transition-all uppercase">
                    Tout sélectionner
                </button>
            </div>
            
            <div id="clubs-list" class="grid-clubs mb-12">
                </div>

            <button onclick="generate()" class="group relative w-full overflow-hidden bg-orange-600 hover:bg-orange-500 py-6 rounded-2xl transition-all shadow-2xl shadow-orange-900/40">
                <span class="relative z-10 text-white font-black text-xl italic tracking-tight flex items-center justify-center gap-3">
                    GÉNÉRER MON FLUX ICAL
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </span>
            </button>
        </main>

        <div id="result" class="hidden mt-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="bg-slate-900 border border-emerald-500/30 p-2 rounded-2xl flex items-center">
                <div class="flex-1 px-4 overflow-hidden">
                    <p class="text-[10px] text-emerald-500 font-black uppercase mb-1">Flux synchronisé prêt</p>
                    <code id="url" class="text-blue-300 text-xs font-mono block truncate"></code>
                </div>
                <button onclick="copyLink()" class="bg-white text-slate-900 font-black text-xs px-6 py-4 rounded-xl hover:bg-emerald-400 transition-colors">
                    COPIER
                </button>
            </div>
            <p class="text-center text-slate-500 text-[10px] mt-4 font-medium uppercase tracking-widest">Insérez ce lien dans Google Calendar ou Apple Calendar</p>
        </div>
    </div>

    <script>
        const clubs = [
            { id: "stade-toulousain", name: "Toulouse" },
            { id: "stade-rochelais", name: "La Rochelle" },
            { id: "ubb-bordeaux", name: "Bordeaux" },
            { id: "rct-toulon", name: "Toulon" },
            { id: "racing-92", name: "Racing 92" },
            { id: "stade-francais", name: "Stade Français" },
            { id: "asm-clermont", name: "Clermont" },
            { id: "lyon-lou", name: "Lyon LOU" },
            { id: "castres-olympique", name: "Castres" },
            { id: "pau-section", name: "Pau" },
            { id: "bayonne", name: "Bayonne" },
            { id: "perpignan", name: "Perpignan" },
            { id: "montpellier", name: "Montpellier" },
            { id: "montauban", name: "Montauban" }
        ];

        const list = document.getElementById('clubs-list');
        clubs.forEach(c => {
            const label = document.createElement('label');
            label.className = "club-card cursor-pointer group";
            label.innerHTML = `
                <input type="checkbox" value="${c.id}" class="hidden">
                <div class="card-content flex flex-col items-center justify-center p-6 bg-slate-800/50 border-2 border-white/5 rounded-[2rem] h-full transition-all">
                    <span class="placeholder-icon text-3xl mb-3 transition-all">🏉</span>
                    <span class="text-[10px] font-black text-slate-400 group-hover:text-white text-center uppercase tracking-tighter">${c.name}</span>
                </div>
            `;
            list.appendChild(label);
        });

        function toggleAll() {
            const checks = document.querySelectorAll('input[type="checkbox"]');
            const allChecked = Array.from(checks).every(c => c.checked);
            checks.forEach(c => c.checked = !allChecked);
            document.getElementById('btnToggle').innerText = allChecked ? "Tout sélectionner" : "Tout décocher";
        }

        function generate() {
            const ids = Array.from(document.querySelectorAll('input:checked')).map(c => c.value).join(',');
            if(!ids) return alert("Veuillez sélectionner au moins un club !");
            
            const link = window.location.origin + '/api/cal?teams=' + btoa(ids);
            document.getElementById('url').innerText = link;
            document.getElementById('result').classList.remove('hidden');
            window.generatedLink = link;
        }

        function copyLink() {
            navigator.clipboard.writeText(window.generatedLink);
            const btn = event.target;
            btn.innerText = "COPIÉ !";
            btn.classList.replace('bg-white', 'bg-emerald-500');
            setTimeout(() => {
                btn.innerText = "COPIER";
                btn.classList.replace('bg-emerald-500', 'bg-white');
            }, 2000);
        }
    </script>
</body>
</html>
